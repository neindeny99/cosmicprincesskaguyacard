<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>かぐや&月見ヤチヨ</title>

<style>
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:sans-serif;
  background:#0d1016;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  color:white;
}

.wrapper{
  width:900px;
  padding:30px;
  background:#151a26;
  border-radius:20px;
}

.card-area{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
  margin-bottom:25px;
}

.card{
  position:relative;
  padding-top:150%;
  perspective:1000px;
  cursor:pointer;
}

.card-inner{
  position:absolute;
  inset:0;
  transition:transform 0.6s ease;
  transform-style:preserve-3d;
}

.card[data-open="true"] .card-inner{
  transform:rotateY(180deg);
}

.card-face{
  position:absolute;
  inset:0;
  border-radius:15px;
  backface-visibility:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  border:2px solid rgba(255,255,255,0.2);
}

.card-back{
  background:#1c3a4a;
}

.card-front{
  transform:rotateY(180deg);
  color:black;
  font-weight:bold;
}

/* 🔥 SSR 특수 효과 */
.ssr-effect{
  animation:ssrSpin 0.8s ease forwards,
            ssrGlow 1.5s ease infinite alternate;
}

@keyframes ssrSpin{
  0%{ transform:rotateY(180deg) scale(0.5); }
  50%{ transform:rotateY(540deg) scale(1.2); }
  100%{ transform:rotateY(180deg) scale(1); }
}

@keyframes ssrGlow{
  from{
    box-shadow:0 0 15px gold, 0 0 30px orange;
  }
  to{
    box-shadow:0 0 35px gold, 0 0 60px orange;
  }
}

.controls{
  text-align:right;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:30px;
  font-weight:bold;
  cursor:pointer;
}

#draw4Btn{
  background:gold;
}

#resetBtn{
  background:#333;
  color:white;
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="card-area">
    <div class="card" data-open="false"></div>
    <div class="card" data-open="false"></div>
    <div class="card" data-open="false"></div>
    <div class="card" data-open="false"></div>
  </div>

  <div class="controls">
    <button id="resetBtn" disabled>초기화</button>
    <button id="draw4Btn">4장 오픈</button>
  </div>
</div>

<script>
const CARD_POOL = [
  {rarity:"SSR", name:"전설의 카드", color:"gold"},
  {rarity:"SR", name:"고급 카드", color:"#b39ddb"},
  {rarity:"R", name:"일반 카드", color:"#90caf9"},
  {rarity:"N", name:"기본 카드", color:"#cfd8dc"}
];

const cards=document.querySelectorAll(".card");
const draw4Btn=document.getElementById("draw4Btn");
const resetBtn=document.getElementById("resetBtn");

cards.forEach(card=>{
  const inner=document.createElement("div");
  inner.className="card-inner";

  const back=document.createElement("div");
  back.className="card-face card-back";
  back.textContent="CLICK";

  const front=document.createElement("div");
  front.className="card-face card-front";

  inner.appendChild(back);
  inner.appendChild(front);
  card.appendChild(inner);

  card.addEventListener("click",()=>{
    if(card.dataset.open==="false"){
      openCard(card);
    }
  });
});

function getRandomCard(){
  return CARD_POOL[Math.floor(Math.random()*CARD_POOL.length)];
}

function openCard(card){
  const info=getRandomCard();
  const front=card.querySelector(".card-front");

  front.textContent=info.rarity+" - "+info.name;
  front.style.background=info.color;

  card.dataset.open="true";

  // SSR이면 특수효과 추가
  if(info.rarity==="SSR"){
    front.classList.add("ssr-effect");
  }

  updateResetState();
}

draw4Btn.addEventListener("click",()=>{
  cards.forEach(card=>{
    if(card.dataset.open==="false"){
      openCard(card);
    }
  });
});

resetBtn.addEventListener("click",()=>{
  cards.forEach(card=>{
    card.dataset.open="false";
    const front=card.querySelector(".card-front");
    front.textContent="";
    front.style.background="";
    front.classList.remove("ssr-effect");
  });
  updateResetState();
});

function updateResetState(){
  const anyOpened=[...cards].some(c=>c.dataset.open==="true");
  resetBtn.disabled=!anyOpened;
}
</script>

</body>
</html>
