<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>超ガチャ姫</title>
<!-- Google Fonts: Noto Serif JP -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}
:root {
  --x-offset: clamp(100px, 15vw, 175px); /* 가로 중심 오프셋 (캐릭터 공간 확보용) */
}
body{
  margin:0;
  font-family:sans-serif;
  background: url('background/KakaoTalk_20260227_144514398.jpg') no-repeat center center fixed;
  background-size: cover;
  display:flex;
  flex-direction: column;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  color:white;
  overflow-x: hidden; /* 가로 스크롤 방지 */
  overflow-y: auto;   /* 세로 스크롤 허용 */
  padding: 20px 10px;
}

/* 🔥 Title Style */
.title {
  font-family: "Noto Serif JP", serif;
  font-size: clamp(3rem, 12vw, 160px); /* 화면 크기에 따라 3rem ~ 160px 자동 조절 */
  font-weight: 700;
  background: linear-gradient(180deg, #FFD700 0%, #FFB700 40%, #FF8C00 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6)) 
          drop-shadow(0 0 12px rgba(255,215,0,0.4));
  letter-spacing: 4px;
  margin: 0 auto 10px auto; /* 중앙 정렬 */
  position: relative;
  z-index: 100;
  pointer-events: none;
  white-space: nowrap;
  text-align: center;
  transform: translateX(var(--x-offset)); /* 타이틀 중심 이동 */
  transition: all 0.5s ease;
}

.title span.super {
  font-size: 1.2em;
}

/* 🔥 Global Standing Image Layer */
.bg-standing {
  position: fixed;
  bottom: -15vw; 
  left: 20px;
  height: clamp(65vh, 90vw, 110vh); /* 화면 너비에 따른 선형 크기 조절 */
  z-index: 1; 
  filter: drop-shadow(20px 0 30px rgba(0,0,0,0.5));
  pointer-events: none;
  transition: all 0.5s ease;
}

.wrapper{
  position: relative;
  z-index: 10;
  width:850px; 
  margin: 0 auto; /* 중앙 정렬 */
  transform: translateX(var(--x-offset)); /* 게임 영역 중심 이동 (타이틀과 완벽하게 일치) */
  padding:40px;
  background: rgba(21, 26, 38, 0.85);
  border-radius:20px;
  display: flex;
  gap: 30px;
  align-items: center;
  transition: all 0.5s ease;
}

.game-area {
  flex: 1;
}

.card-area{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
  margin-bottom:25px;
}

.card{
  position:relative;
  padding-top:150%;
  perspective:1000px;
  cursor:pointer;
}

.card-inner{
  position:absolute;
  inset:0;
  transition:transform 0.6s ease;
  transform-style:preserve-3d;
}

.card[data-open="true"] .card-inner{
  transform:rotateY(180deg);
}

.card-face{
  position:absolute;
  inset:0;
  border-radius:15px;
  backface-visibility:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  border:2px solid rgba(255,255,255,0.2);
  overflow: hidden; /* 이미지 넘침 방지 */
}

.card-back{
  background:#1c3a4a;
}

.card-front{
  transform:rotateY(180deg);
  background: white;
}

.card-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 🔥 Rarity Borders */
.sr-border {
  border: 5px solid yellow !important;
  box-shadow: 0 0 15px rgba(255, 255, 0, 0.6);
}

.r-border {
  border: 5px solid #00BFFF !important;
  box-shadow: 0 0 15px rgba(0, 191, 255, 0.6);
}

/* 🔥 SSR 특수 효과: 실행 시간 1.5초 유지하며 일정한 속도로 회전 */
.ssr-effect{
  border: 5px solid deeppink !important;
  animation:ssrSpin 1.5s linear forwards,
            ssrGlow 1.5s ease infinite alternate;
}

@keyframes ssrSpin{
  0%{ transform:rotateY(180deg) scale(0.5); }
  100%{ transform:rotateY(1620deg) scale(1); }
}

@keyframes ssrGlow{
  from{
    box-shadow:0 0 15px deeppink, 0 0 30px hotpink;
  }
  to{
    box-shadow:0 0 35px deeppink, 0 0 60px hotpink;
  }
}

/* 📱 Responsive Design (Method C) */

/* 1. 태블릿 구간 (768px ~ 1024px) */
@media (max-width: 1024px) {
  :root {
    --x-offset: 10vw; /* 태블릿용 오프셋 */
  }

  .bg-standing {
    left: -10vw; 
    bottom: -10vw;
  }

  .wrapper {
    width: 70%;
    margin: 0 auto;
    padding: 25px;
  }

  .card-area {
    gap: 15px;
  }
}

/* 2. 모바일 구간 (768px 미만) */
@media (max-width: 768px) {
  :root {
    --x-offset: 0; /* 모바일용 오프셋 (완전 중앙) */
  }

  .bg-standing {
    left: 50%;
    transform: translateX(-50%); /* 중앙 배치 */
    bottom: -10vw;
    opacity: 0.3; /* 콘텐츠 가독성을 위해 배경화 */
    z-index: 0;
  }

  .wrapper {
    width: 95%; 
    margin: 20px auto; 
    padding: 15px;
    background: rgba(21, 26, 38, 0.9); 
  }

  .card-area {
    grid-template-columns: repeat(4, 1fr); 
    gap: 8px; 
  }

  .controls {
    text-align: center; 
    margin-top: 15px;
  }

  button {
    width: 48%; 
    padding: 12px 5px;
    font-size: 14px;
  }
}

.controls{
  text-align:right;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:30px;
  font-weight:bold;
  cursor:pointer;
}

#draw4Btn{
  background:gold;
}

#resetBtn{
  background:#333;
  color:white;
}
</style>
</head>

<body>

<h1 class="title"><span class="super">超</span>ガチャ姫</h1>

<!-- 배경 스탠딩 이미지 -->
<img id="bgStanding" src="" class="bg-standing" alt="standing">

<div class="wrapper">
  <div class="game-area">
    <div class="card-area">
      <div class="card" data-open="false"></div>
      <div class="card" data-open="false"></div>
      <div class="card" data-open="false"></div>
      <div class="card" data-open="false"></div>
    </div>

    <div class="controls">
      <button id="resetBtn" disabled>初期化</button>
      <button id="draw4Btn">4枚オープン</button>
    </div>
  </div>
</div>

<script>
const CARD_IMAGES = {
  SSR: [
    "card/ssr/그림10.png", "card/ssr/그림11.png", "card/ssr/그림12.png", 
    "card/ssr/그림13.png", "card/ssr/그림9.png"
  ],
  SR: [
    "card/sr/fushi.png", "card/sr/inudoge.png", "card/sr/그림20.png", "card/sr/그림21.png"
  ],
  R: [
    "card/r/그림14.png", "card/r/그림15.png", "card/r/그림23.png", 
    "card/r/라이.png", "card/r/미카도.png", "card/r/사카요리모미지.png"
  ],
  N: [
    "card/n/9776.jpg", "card/n/그림6.png", "card/n/그림7.png", "card/n/그림8.png"
  ]
};

const CARD_POOL = [
  {rarity:"SSR", color:"gold"},
  {rarity:"SR", color:"#b39ddb"},
  {rarity:"R", color:"#90caf9"},
  {rarity:"N", color:"#cfd8dc"}
];

const STANDING_IMAGES = [
  "standing/2036613928_0b513829__2main.png",
  "standing/2036613928_902dbacc__1main.png",
  "standing/2036613928_c0b9b227__0main.png",
  "standing/2937856005_4586d0fa_98-webp.png",
  "standing/2937856005_53f442d7_98-webp.png",
  "standing/2937856005_d77b25e9_98-webp.png"
];

// 랜덤 스탠딩 이미지 설정 (배경 레이어)
const bgStanding = document.getElementById("bgStanding");
const randomStanding = STANDING_IMAGES[Math.floor(Math.random() * STANDING_IMAGES.length)];
bgStanding.src = randomStanding;

const cards=document.querySelectorAll(".card");
const draw4Btn=document.getElementById("draw4Btn");
const resetBtn=document.getElementById("resetBtn");

cards.forEach(card=>{
  const inner=document.createElement("div");
  inner.className="card-inner";

  const back=document.createElement("div");
  back.className="card-face card-back";
  back.textContent="CLICK";

  const front=document.createElement("div");
  front.className="card-face card-front";

  inner.appendChild(back);
  inner.appendChild(front);
  card.appendChild(inner);

  card.addEventListener("click",()=>{
    if(card.dataset.open==="false"){
      openCard(card);
    }
  });
});

function getRandomCard(){
  // 가중치 확률 (SSR: 4%, SR: 12%, R: 24%, N: 60%)
  const rand = Math.random() * 100;
  if (rand < 4) return CARD_POOL[0]; // SSR
  if (rand < 16) return CARD_POOL[1]; // SR
  if (rand < 40) return CARD_POOL[2]; // R
  return CARD_POOL[3]; // N
}

function openCard(card){
  const info=getRandomCard();
  const front=card.querySelector(".card-front");
  
  // 등급별 클래스 제거 (초기화 대비)
  front.classList.remove("ssr-effect", "sr-border", "r-border");

  // 해당 등급의 이미지 중 하나 무작위 선택
  const pool = CARD_IMAGES[info.rarity];
  const imgUrl = pool[Math.floor(Math.random() * pool.length)];

  // 기존 내용 제거 후 이미지 추가
  front.innerHTML = "";
  const img = document.createElement("img");
  img.src = imgUrl;
  img.className = "card-image";
  front.appendChild(img);

  card.dataset.open="true";

  // 등급에 따른 테두리/효과 추가
  if(info.rarity==="SSR"){
    front.classList.add("ssr-effect");
  } else if(info.rarity==="SR"){
    front.classList.add("sr-border");
  } else if(info.rarity==="R"){
    front.classList.add("r-border");
  }

  updateResetState();
}

draw4Btn.addEventListener("click",()=>{
  cards.forEach(card=>{
    if(card.dataset.open==="false"){
      openCard(card);
    }
  });
});

resetBtn.addEventListener("click",()=>{
  cards.forEach(card=>{
    card.dataset.open="false";
    const front=card.querySelector(".card-front");
    front.innerHTML = "";
    front.classList.remove("ssr-effect", "sr-border", "r-border");
  });
  updateResetState();
});

function updateResetState(){
  const anyOpened=[...cards].some(c=>c.dataset.open==="true");
  resetBtn.disabled=!anyOpened;
}
</script>

</body>
</html>
