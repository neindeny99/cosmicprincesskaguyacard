<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>かぐや&月見ヤ치요</title>

<style>
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:sans-serif;
  background: url('background/KakaoTalk_20260227_144514398.jpg') no-repeat center center fixed;
  background-size: cover;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  color:white;
  overflow: hidden;
}

/* 🔥 Global Standing Image Layer */
.bg-standing {
  position: fixed;
  bottom: -120px; /* 하반신 조금 잘리게 */
  left: 20px;
  height: 110vh;
  z-index: 1; /* wrapper(10)보다 뒤, 배경보다 앞 */
  filter: drop-shadow(20px 0 30px rgba(0,0,0,0.5));
  pointer-events: none;
}

.wrapper{
  position: relative;
  z-index: 10;
  width:850px; /* 스탠딩이 빠져서 가로폭 축소 */
  margin-left: 350px; /* 왼쪽 스탠딩 공간 확보 */
  padding:40px;
  background: rgba(21, 26, 38, 0.85);
  border-radius:20px;
  display: flex;
  gap: 30px;
  align-items: center;
}

.game-area {
  flex: 1;
}

.card-area{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
  margin-bottom:25px;
}

.card{
  position:relative;
  padding-top:150%;
  perspective:1000px;
  cursor:pointer;
}

.card-inner{
  position:absolute;
  inset:0;
  transition:transform 0.6s ease;
  transform-style:preserve-3d;
}

.card[data-open="true"] .card-inner{
  transform:rotateY(180deg);
}

.card-face{
  position:absolute;
  inset:0;
  border-radius:15px;
  backface-visibility:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  border:2px solid rgba(255,255,255,0.2);
}

.card-back{
  background:#1c3a4a;
}

.card-front{
  transform:rotateY(180deg);
  color:black;
  font-weight:bold;
}

/* 🔥 Deco Image Effect */
.card-deco {
  position: absolute;
  top: -40px;
  right: -30px;
  width: 120px;
  z-index: 100;
  pointer-events: none;
  display: none;
  filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
}

.card[data-open="true"] .card-deco {
  display: block;
  animation: decoFadeIn 0.5s ease forwards;
}

@keyframes decoFadeIn {
  from { opacity: 0; transform: translateY(20px) scale(0.8); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* 🔥 SSR 특수 효과 */
.ssr-effect{
  animation:ssrSpin 0.8s ease forwards,
            ssrGlow 1.5s ease infinite alternate;
}

@keyframes ssrSpin{
  0%{ transform:rotateY(180deg) scale(0.5); }
  50%{ transform:rotateY(540deg) scale(1.2); }
  100%{ transform:rotateY(180deg) scale(1); }
}

@keyframes ssrGlow{
  from{
    box-shadow:0 0 15px gold, 0 0 30px orange;
  }
  to{
    box-shadow:0 0 35px gold, 0 0 60px orange;
  }
}

.controls{
  text-align:right;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:30px;
  font-weight:bold;
  cursor:pointer;
}

#draw4Btn{
  background:gold;
}

#resetBtn{
  background:#333;
  color:white;
}
</style>
</head>

<body>

<!-- 배경 스탠딩 이미지 -->
<img id="bgStanding" src="" class="bg-standing" alt="standing">

<div class="wrapper">
  <div class="game-area">
    <div class="card-area">
      <div class="card" data-open="false"></div>
      <div class="card" data-open="false"></div>
      <div class="card" data-open="false"></div>
      <div class="card" data-open="false"></div>
    </div>

    <div class="controls">
      <button id="resetBtn" disabled>초기화</button>
      <button id="draw4Btn">4장 오픈</button>
    </div>
  </div>
</div>

<script>
const CARD_POOL = [
  {rarity:"SSR", name:"전설의 카드", color:"gold"},
  {rarity:"SR", name:"고급 카드", color:"#b39ddb"},
  {rarity:"R", name:"일반 카드", color:"#90caf9"},
  {rarity:"N", name:"기본 카드", color:"#cfd8dc"}
];

const STANDING_IMAGES = [
  "standing/2036613928_0b513829__2main.png",
  "standing/2036613928_902dbacc__1main.png",
  "standing/2036613928_c0b9b227__0main.png",
  "standing/2937856005_4586d0fa_98-webp.png",
  "standing/2937856005_53f442d7_98-webp.png",
  "standing/2937856005_d77b25e9_98-webp.png"
];

// 랜덤 스탠딩 이미지 설정 (배경 레이어)
const bgStanding = document.getElementById("bgStanding");
const randomStanding = STANDING_IMAGES[Math.floor(Math.random() * STANDING_IMAGES.length)];
bgStanding.src = randomStanding;

const cards=document.querySelectorAll(".card");
const draw4Btn=document.getElementById("draw4Btn");
const resetBtn=document.getElementById("resetBtn");

cards.forEach(card=>{
  const inner=document.createElement("div");
  inner.className="card-inner";

  const back=document.createElement("div");
  back.className="card-face card-back";
  back.textContent="CLICK";

  const front=document.createElement("div");
  front.className="card-face card-front";

  const deco = document.createElement("img");
  deco.className = "card-deco";
  deco.src = "example/9774.jpg";

  inner.appendChild(back);
  inner.appendChild(front);
  front.appendChild(deco);
  card.appendChild(inner);

  card.addEventListener("click",()=>{
    if(card.dataset.open==="false"){
      openCard(card);
    }
  });
});

function getRandomCard(){
  return CARD_POOL[Math.floor(Math.random()*CARD_POOL.length)];
}

function openCard(card){
  const info=getRandomCard();
  const front=card.querySelector(".card-front");

  front.textContent=info.rarity+" - "+info.name;
  front.style.background=info.color;

  card.dataset.open="true";

  // SSR이면 특수효과 추가
  if(info.rarity==="SSR"){
    front.classList.add("ssr-effect");
  }

  updateResetState();
}

draw4Btn.addEventListener("click",()=>{
  cards.forEach(card=>{
    if(card.dataset.open==="false"){
      openCard(card);
    }
  });
});

resetBtn.addEventListener("click",()=>{
  cards.forEach(card=>{
    card.dataset.open="false";
    const front=card.querySelector(".card-front");
    front.textContent="";
    front.style.background="";
    front.classList.remove("ssr-effect");
  });
  updateResetState();
});

function updateResetState(){
  const anyOpened=[...cards].some(c=>c.dataset.open==="true");
  resetBtn.disabled=!anyOpened;
}
</script>

</body>
</html>
